name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build PurelySharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PurelySharp.Test/PurelySharp.Test.csproj --configuration Release --verbosity normal

      - name: Build VSIX project
        run: |
          dotnet build PurelySharp.Vsix/PurelySharp.Vsix.csproj --configuration Release /p:EnableVsixPackaging=true

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: PurelySharp.Vsix/bin/Release/*.vsix
          if-no-files-found: warn

      - name: Package NuGet
        run: dotnet pack PurelySharp.Package/PurelySharp.Package.csproj --configuration Release --output nupkgs

      - name: Validate NuGet package contents
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem nupkgs -Filter PurelySharp.*.nupkg -File |
            Where-Object { $_.Name -notlike "PurelySharp.Attributes.*" } |
            Sort-Object Name)

          if ($packages.Count -ne 1) {
            $found = if ($packages.Count -eq 0) { "<none>" } else { $packages.Name -join ", " }
            throw "Expected exactly one PurelySharp analyzer package, found $($packages.Count): $found"
          }

          $package = $packages[0]
          $entries = tar -tf $package.FullName
          $requiredEntries = @(
            "README.md",
            "analyzers/dotnet/cs/PurelySharp.Analyzer.dll",
            "analyzers/dotnet/cs/PurelySharp.CodeFixes.dll",
            "lib/netstandard2.0/PurelySharp.Attributes.dll",
            "tools/install.ps1",
            "tools/uninstall.ps1"
          )

          foreach ($entry in $requiredEntries) {
            if ($entries -notcontains $entry) {
              throw "Package $($package.Name) is missing required entry: $entry"
            }
          }

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
